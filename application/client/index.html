<!DOCTYPE html>
<html>
 <head>
   <title>마침표. 하이퍼레저 패브릭 디지털 유언장</title>

   <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.0/jquery.min.js"></script>
   <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
   <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.4.3/angular.min.js"></script>

   <style type="text/css">
      body { font-family: Arial, sans-serif; }
      header {
        background-color: lightskyblue;
        font-size: 20px;
        padding: 20px;
        margin-bottom: 3%;
        color: white;
        text-align: center;
      }
      .form-group {
        width: 80%;
        margin: 20px auto;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 5px;
        background-color: #f9f9f9;
      }
      label {
        font-size: 18px;
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
      }
      .form-control {
        margin-bottom: 15px;
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      textarea.form-control {
        min-height: 150px;
        resize: vertical;
      }
      .btn {
        padding: 10px 15px;
        margin-right: 10px;
      }
      hr {
        border-top: 1px solid #ccc;
        margin-top: 30px;
        margin-bottom: 30px;
      }
      .response-area {
        margin-top: 15px;
        padding: 15px;
        background-color: #e9e9e9;
        border: 1px solid #ccc;
        border-radius: 4px;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-family: monospace;
        max-height: 300px; /* 응답 영역 최대 높이 제한 */
        overflow-y: auto;  /* 내용 많을 시 스크롤 */
      }
      .status-message {
        font-weight: bold;
        margin-bottom: 10px;
      }
      .status-message.success { color: green; }
      .status-message.error { color: red; }
      .status-message.warning { color: orange; } /* 경고 메시지 스타일 추가 */
      #body-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
      }
      .will-list-item { /* 유언장 목록 아이템 스타일 */
        padding: 5px;
        border-bottom: 1px solid #eee;
        cursor: pointer;
      }
      .will-list-item:hover {
        background-color: #f0f0f0;
      }
   </style>
 </head>
 <body ng-app="application" ng-controller="AppCtrl">
    <header>
      <div id="left_header">마침표. 하이퍼레저 패브릭 기반 디지털 유언장 플랫폼</div>
    </header>

    <div id="body-container">
        <h2>디지털 유언장 관리</h2>

        <!-- 1. 유언장 등록 -->
        <div class="form-group">
            <label>1. 유언장 작성 및 등록 (RegisterWill)</label>
            <div class="status-message" ng-class="{success: will_register_status_type === 'success', error: will_register_status_type === 'error', warning: will_register_status_type === 'warning'}" ng-show="will_register_status_msg">{{will_register_status_msg}}</div>

            <input class="form-control" type="text" placeholder="유언장 제목 (예: 나의 첫 유언)" ng-model="will.title">
            <textarea class="form-control" placeholder="유언장 원본 내용을 여기에 작성하세요..." ng-model="will.originalContent"></textarea>
            <input class="form-control" type="text" placeholder='수혜자 목록 (JSON 배열 문자열, 예: ["Alice","Bob"] )' ng-model="will.beneficiaries">
            <input class="form-control" type="text" placeholder="유언 작성자 ID (예: user1)" ng-model="will.testatorId">
            <!-- 실제 서비스에서는 testatorId는 로그인 세션 등에서 자동으로 가져옵니다. -->

            <button class="btn btn-success" ng-click="registerWill()">유언장 등록</button>
            <div class="response-area" ng-show="will_register_response">{{will_register_response}}</div>
        </div>
        <hr>

        <!-- 2. 나의 유언장 목록 조회 -->
        <div class="form-group">
            <label>2. 나의 유언장 목록 조회 (GetMyWills)</label>
            <button class="btn btn-info" ng-click="getMyWills()">나의 유언장 목록 보기</button>
            <div class="response-area" ng-show="my_wills_response">
                <div ng-hide="my_wills_list.length > 0">{{my_wills_response}}</div>
                <div ng-show="my_wills_list.length > 0">
                    <p>{{my_wills_response}}</p>
                    <strong>클릭하여 상세 조회:</strong>
                    <ul>
                        <!-- 체인코드에서 반환하는 will 객체의 ID 필드명에 따라 'item.willID' 또는 'item.Key' 등을 사용해야 합니다. -->
                        <!-- 여기서는 체인코드가 {willID: "...", title: "..."} 형태의 객체 배열을 반환한다고 가정합니다. -->
                        <li ng-repeat="item in my_wills_list track by $index" class="will-list-item" ng-click="populateAndGetDetails(item.willID || item.Key)">
                           <strong>ID:</strong> {{item.willID || item.Key}} <br>
                           <strong>제목:</strong> {{item.title || "제목 없음"}}
                           <span ng-if="item.docType"> ({{item.docType}})</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <hr>

        <!-- 3. 유언장 상세 조회 -->
        <div class="form-group">
          <label>3. 유언장 상세 조회 (GetWillDetails)</label>
          <div class="status-message error" ng-show="will_details_error">{{will_details_error}}</div>

          <input class="form-control" type="text" placeholder="조회할 '블록체인 Will ID'를 입력하거나 위 목록에서 선택하세요." ng-model="queryWillId">
          <button class="btn btn-primary" ng-click="getWillDetails()">유언장 상세 보기</button>
          <!-- 이 response-area에 서버로부터 받은 JSON 응답 (originalContent 포함)이 표시됨 -->
          <div class="response-area" ng-show="will_details_response">{{will_details_response}}</div>
      </div>

    </div> <!-- end of body-container -->
  </body>
  <script type="text/javascript" src="app.js"> </script>
 </html>
